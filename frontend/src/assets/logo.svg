<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient violet premium -->
    <linearGradient id="violetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E9D5FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C4B5FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="deepViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="gloss" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Decorative circles -->
  <circle cx="80" cy="100" r="3" fill="url(#deepViolet)" opacity="0.6" filter="url(#glow)"/>
  <circle cx="110" cy="140" r="2" fill="url(#deepViolet)" opacity="0.5"/>
  <circle cx="320" cy="120" r="2.5" fill="url(#deepViolet)" opacity="0.6"/>
  <circle cx="340" cy="160" r="1.5" fill="url(#deepViolet)" opacity="0.4"/>

  <!-- Main text with elegant styling -->
  <text x="200" y="200" font-family="'Georgia', 'Garamond', serif" font-size="72" 
        font-weight="300" text-anchor="middle" fill="url(#deepViolet)" 
        letter-spacing="3" font-style="italic">
    Scent
  </text>

  <text x="200" y="280" font-family="'Georgia', 'Garamond', serif" font-size="72" 
        font-weight="300" text-anchor="middle" fill="url(#deepViolet)" 
        letter-spacing="3" font-style="italic">
    Spray Me
  </text>

  <!-- Decorative lines -->
  <line x1="40" y1="310" x2="360" y2="310" stroke="url(#violetGradient)" stroke-width="2" opacity="0.7"/>
  <line x1="60" y1="320" x2="340" y2="320" stroke="url(#deepViolet)" stroke-width="1" opacity="0.4"/>

  <!-- Subtle sparkles for luxury -->
  <g opacity="0.7" filter="url(#glow)">
    <circle cx="100" cy="80" r="1.5" fill="url(#deepViolet)"/>
    <circle cx="140" cy="110" r="1" fill="url(#deepViolet)"/>
    <circle cx="310" cy="90" r="1.2" fill="url(#deepViolet)"/>
    <circle cx="350" cy="130" r="0.8" fill="url(#deepViolet)"/>
  </g>

  <!-- Accent dots -->
  <circle cx="200" cy="340" r="2" fill="url(#deepViolet)" opacity="0.5"/>
  <circle cx="170" cy="340" r="1.5" fill="url(#deepViolet)" opacity="0.4"/>
  <circle cx="230" cy="340" r="1.5" fill="url(#deepViolet)" opacity="0.4"/>
</svg>